<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>Demande reçue — Zoomy</title>
<meta content="noindex,nofollow" name="robots"/>
<link href="../favicon.png" rel="icon" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:48px;text-decoration:none;display:inline-block;}
.icon{width:72px;height:72px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 28px;}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;color:#fff;margin-bottom:16px;}
p{color:#94a3b8;font-size:1rem;line-height:1.7;max-width:420px;margin:0 auto 32px;}
.highlight{color:#6366f1;font-weight:500;}
.btn{display:inline-block;background:#6366f1;color:#fff;padding:14px 36px;border-radius:50px;font-weight:600;font-size:.95rem;text-decoration:none;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.divider{width:48px;height:2px;background:linear-gradient(90deg,#6366f1,#8b5cf6);margin:36px auto;}
.note{color:#475569;font-size:.82rem;}
</style>
<script>localStorage.setItem('zmy_lang','fr');</script></head>
<body>
<a class="logo" href="index.html">Zoomy</a>
<div class="icon">✓</div>
<h1>Demande reçue !</h1>
<p>Merci de nous avoir contactés. Nous avons reçu votre message et vous répondrons à <span class="highlight">contact@zoomy.services</span> dans les 24 heures.</p>
<a class="btn" href="index.html">Retour à la page d'accueil</a>
<div class="divider"></div>
<p class="note">Zoomy LLC · 328 Hamilton Ave Apt 3, Greenwich, CT 06830 · +1 (914) 742-0640</p>
<script>
function toggleTheme(){
  var html=document.documentElement;
  var isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('zt',isDark?'light':'dark');
  var btn=document.getElementById('themeToggle');
  if(btn)btn.innerHTML=isDark
    ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
}
(function(){
  var t=localStorage.getItem('zt')||'light';
  document.documentElement.setAttribute('data-theme',t);
})();
</script>
</body>
</html>
