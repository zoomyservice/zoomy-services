<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48" fill="none">
  <defs>
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Z mark: filled gradient rounded square (same as favicon) -->
  <rect x="0" y="0" width="48" height="48" rx="11" fill="url(#zg)"/>
  <!-- Z strokes in white -->
  <line x1="12" y1="13" x2="36" y2="13" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="36" y1="13" x2="12" y2="35" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="12" y1="35" x2="36" y2="35" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Wordmark: "ZOOMY" — tracked, gradient fill -->
  <text
    x="62" y="34"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-weight="800"
    font-size="28"
    letter-spacing="1"
    fill="url(#tg)"
  >ZOOMY</text>
</svg>