<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Z mark — bold geometric Z in a soft-rounded square -->
  <rect x="2" y="2" width="52" height="52" rx="12" fill="url(#g1)" opacity="0.15"/>
  <rect x="2" y="2" width="52" height="52" rx="12" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- Z strokes: top bar, diagonal, bottom bar -->
  <line x1="14" y1="16" x2="42" y2="16" stroke="url(#g1)" stroke-width="5" stroke-linecap="round"/>
  <line x1="42" y1="16" x2="14" y2="40" stroke="url(#g1)" stroke-width="5" stroke-linecap="round"/>
  <line x1="14" y1="40" x2="42" y2="40" stroke="url(#g1)" stroke-width="5" stroke-linecap="round"/>
  <!-- Speed accent dot -->
  <circle cx="46" cy="40" r="3.5" fill="#06b6d4" opacity="0.9"/>
  <!-- Wordmark -->
  <text x="68" y="37" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="700" font-size="26" fill="url(#g2)" letter-spacing="-0.5">Zoomy</text>
</svg>